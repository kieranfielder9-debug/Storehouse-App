<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D9488"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.88"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#5EEAD4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#glow)"/>
  <!-- Storehouse mark -->
  <g transform="translate(256 256) scale(11) translate(-16 -15)">
    <!-- Sharp upward roof -->
    <path d="M16 3 L29 14 L26 14 L16 6.5 L6 14 L3 14 Z" fill="url(#house)"/>
    <!-- House body -->
    <path d="M7 14 L25 14 L25 27 L20 27 L20 19 L12 19 L12 27 L7 27 Z" fill="url(#house)"/>
    <!-- Door highlight -->
    <rect x="14" y="21" width="4" height="6" fill="#0D9488" rx="0.5"/>
  </g>
</svg>
