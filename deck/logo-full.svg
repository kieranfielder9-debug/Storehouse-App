    />
    <rect x="472" y="330" width="46" height="360" rx="4" fill="#1D3557"/>
    <rect x="378" y="410" width="234" height="46" rx="4" fill="#1D3557"/>
    <rect x="576" y="640" width="42" height="80"  rx="4" fill="url(#bars2)"/>
    <rect x="632" y="580" width="42" height="140" rx="4" fill="url(#barsMid2)"/>
    <rect x="688" y="500" width="42" height="220" rx="4" fill="url(#barsHigh2)"/>
  </g>

  <!-- Wordmark -->
  <text x="700" y="1200" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
