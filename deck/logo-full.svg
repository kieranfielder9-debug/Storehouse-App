  <!-- Divider -->
  <line x1="380" y1="1265" x2="520" y2="1265" stroke="#0D9488" stroke-width="6" stroke-linecap="round"/>
  <line x1="880" y1="1265" x2="1020" y2="1265" stroke="#0D9488" stroke-width="6" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="700" y="1300" text-anchor="middle"
